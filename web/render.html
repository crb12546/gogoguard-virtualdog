<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;background:#9fb4c8}canvas{display:block}</style></head>
<body>
<script type="module">
// 虚拟世界渲染页：?scene=person_down|fire|clutter|normal &cam=eye|iso → 渲一帧狗相机看到的画面。
// 低多边形即可(实验证明 qwen-vl 这种画质就能判)。无头 Chromium 截这张 canvas = 相机帧。
import * as THREE from './lib/three.module.js';
const P = new URLSearchParams(location.search);
const SCENE = P.get('scene') || 'normal';
const CAMMODE = P.get('cam') || 'iso';
const W = 640, H = 640;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H); renderer.setPixelRatio(1);
renderer.domElement.id = 'c'; document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaebfce);
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dl = new THREE.DirectionalLight(0xffffff, 0.9); dl.position.set(6, 12, 4); scene.add(dl);
const mat = (c, e) => new THREE.MeshStandardMaterial({ color: c, emissive: e || 0x000000, emissiveIntensity: e ? 1.3 : 0, roughness: 0.85 });

// 室内地面 + 两堵墙
const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), mat(0xe3e9ef));
floor.rotation.x = -Math.PI / 2; scene.add(floor);
const wallM = mat(0xc2cedb);
const wA = new THREE.Mesh(new THREE.BoxGeometry(16, 3.2, 0.2), wallM); wA.position.set(0, 1.6, -4); scene.add(wA);
const wB = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3.2, 16), wallM); wB.position.set(-4, 1.6, 0); scene.add(wB);

function personMesh() {
  const g = new THREE.Group();
  const skin = mat(0xe6b58f), shirt = mat(0x3a6ea5), pants = mat(0x2f343b), hair = mat(0x3a2a20);
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.7, 0.3), shirt); torso.position.y = 1.0; g.add(torso);
  const hip = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.3, 0.28), pants); hip.position.y = 0.6; g.add(hip);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.12), skin); neck.position.y = 1.42; g.add(neck);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.17, 18, 18), skin); head.position.y = 1.58; g.add(head);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.18, 18, 18, 0, 6.3, 0, 1.4), hair); cap.position.y = 1.6; g.add(cap);
  const arm = (s) => { const a = new THREE.Mesh(new THREE.CapsuleGeometry(0.075, 0.52, 5, 10), shirt); a.position.set(s * 0.36, 1.0, 0); a.rotation.z = s * 0.32; g.add(a); };
  arm(1); arm(-1);
  const leg = (s) => { const l = new THREE.Mesh(new THREE.CapsuleGeometry(0.1, 0.62, 5, 10), pants); l.position.set(s * 0.13, 0.2, 0); g.add(l); };
  leg(1); leg(-1);
  return g;
}
function fireMesh() {
  const g = new THREE.Group();
  const flame = [0xff4400, 0xff7a00, 0xffc107];
  for (let i = 0; i < 9; i++) {
    const c = new THREE.Mesh(new THREE.ConeGeometry(0.22 - i * 0.018, 0.5 + (i % 3) * 0.35, 8), mat(flame[i % 3], flame[i % 3]));
    c.position.set((i % 3 - 1) * 0.28 + (i * 0.07 % 0.2), 0.32 + (i % 3) * 0.22, ((i % 2) - 0.5) * 0.4); g.add(c);
  }
  for (let i = 0; i < 5; i++) { const s = new THREE.Mesh(new THREE.SphereGeometry(0.26 + i * 0.04, 8, 8), new THREE.MeshStandardMaterial({ color: 0x3a3a3a, transparent: true, opacity: 0.55 })); s.position.set((Math.sin(i) * 0.5), 1.3 + i * 0.32, Math.cos(i) * 0.4); g.add(s); }
  return g;
}
function clutterMesh() {
  const g = new THREE.Group();
  const cols = [0xcf4b3a, 0x4aa86a, 0xe0ac2b, 0xeeeeee, 0x7d86c4, 0xb9763a];
  for (let i = 0; i < 16; i++) {
    const sz = 0.13 + (i * 37 % 100) / 100 * 0.24;
    const m = new THREE.Mesh(new THREE.BoxGeometry(sz, sz * (0.4 + (i % 3) * 0.3), sz * 0.8), mat(cols[i % cols.length]));
    m.position.set(((i * 53 % 100) / 100 - 0.5) * 5, sz * 0.25, ((i * 91 % 100) / 100 - 0.5) * 5);
    m.rotation.y = (i * 0.7); g.add(m);
  }
  return g;
}

let target = new THREE.Vector3(0, 0.6, 0);
if (SCENE === 'person_down') { const p = personMesh(); p.rotation.x = -Math.PI / 2; p.position.set(0, 0.2, 0); scene.add(p); target.set(0, 0.2, 0); }
else if (SCENE === 'fire') { const f = fireMesh(); f.position.set(-3.2, 0, -3.2); scene.add(f); target.set(-3.2, 0.6, -3.2); }
else if (SCENE === 'clutter') { scene.add(clutterMesh()); target.set(0, 0.2, 0); }
else { const p = personMesh(); p.position.set(0, 0, 0); scene.add(p); target.set(0, 0.9, 0); }

if (CAMMODE === 'eye') {                       // 狗视角：低、向前看
  const cx = target.x + 3.2, cz = target.z + 3.2;
  renderer.domElement && (function () { })();
  scene.background = new THREE.Color(0xaebfce);
  const cam = new THREE.PerspectiveCamera(60, W / H, 0.05, 100);
  cam.position.set(cx, 0.45, cz); cam.lookAt(target.x, 0.25, target.z);
  window.__cam = cam;
} else {                                        // 等距 3/4 俯视(辨识度高)
  const cam = new THREE.PerspectiveCamera(45, W / H, 0.05, 100);
  cam.position.set(target.x + 3.4, 3.0, target.z + 3.4); cam.lookAt(target.x, target.y, target.z);
  window.__cam = cam;
}
renderer.render(scene, window.__cam);
window.__rendered = true;
</script>
</body></html>
