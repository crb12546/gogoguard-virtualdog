<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🐕 犬境 · 虚拟狗世界</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#283039;--txt:#e6edf3;--mut:#8b949e;--grn:#2ea043;--red:#da3633;--blu:#1f6feb;--amb:#d29922}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,"PingFang SC",Segoe UI,sans-serif}
  .wrap{max-width:1080px;margin:0 auto;padding:16px}
  h1{font-size:18px;margin:0 0 12px;display:flex;align-items:center;gap:10px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--mut)}.dot.on{background:var(--grn);box-shadow:0 0 8px var(--grn)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  label{color:var(--mut);font-size:12px}
  input{background:#0d1117;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 8px;font-size:13px}
  button{background:#21262d;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  button:hover{border-color:#3d444d}button.primary{background:var(--blu);border-color:var(--blu)}button.go{background:var(--grn);border-color:var(--grn)}button.warn{background:var(--red);border-color:var(--red)}
  button.sel{outline:2px solid var(--amb)}
  .main{display:grid;grid-template-columns:1fr 320px;gap:12px}
  #map{width:100%;height:520px;border-radius:10px;background:#0a0d11;display:block;cursor:crosshair}
  #cam{width:100%;border-radius:8px;background:#000;display:block}
  .sec{color:var(--mut);font-size:12px;margin:0 0 6px}
  #log{background:#0a0d11;border:1px solid var(--line);border-radius:8px;padding:8px;height:150px;overflow:auto;font:12px/1.55 ui-monospace,Menlo,monospace;color:#c9d1d9;white-space:pre-wrap}
  .pal button{font-size:13px}
  .err{color:#ff7b72;font-size:12px}.muted{color:var(--mut);font-size:12px}
</style></head>
<body><div class="wrap">
  <h1>🐕 犬境 <span class="muted" style="font-size:13px;font-weight:400">· 虚拟狗世界</span> <span id="dot" class="dot"></span> <span id="conn" class="muted">未连接</span></h1>

  <div class="card"><div class="row">
    <label>平台</label><input id="backend" style="flex:1;min-width:180px" placeholder="http://localhost:8000">
    <label>robotId</label><input id="robotId" style="width:120px" placeholder="go2-tju-01">
    <label>令牌</label><input id="token" type="password" style="width:150px" placeholder="dev-...">
    <button class="primary" onclick="connect()">连接</button>
    <span id="err" class="err"></span>
  </div>
  <div style="margin-top:8px;font-size:13.5px;color:#cbd5e1">🐕 <b>这是一只你用鼠标遥控的"假狗"</b>,代替还没造好的真狗,用来测试/演示 GoGoGuard 平台。</div>
  <div class="muted" style="margin-top:4px">三步:<b style="color:#3fb950">①</b> 填令牌→点连接　<b style="color:#3fb950">②</b> 点下面「🆘人倒地」,再点地图把它扔下去　<b style="color:#3fb950">③</b> 点「▶开始巡检」→ 看右边日志,你的平台大屏会弹告警</div>
  </div>

  <div class="main">
    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <button class="go" onclick="startWalk()">▶ 开始巡检</button>
        <button onclick="togglePause()">⏸ 暂停/继续</button>
        <button onclick="stopWalk()">⏹ 回待命</button>
        <button id="viewBtn" onclick="toggleView()">🌐 全景</button>
        <button id="pcdBtn" onclick="togglePcd()">🗺️ 看真实楼(可选)</button>
        <label>速度</label><input id="speed" type="range" min="0.3" max="2.5" step="0.1" value="0.9" style="width:110px" oninput="dog.speed=+this.value">
        <span class="muted" id="viewhint">俯视：点地图摆物；全景：拖动转视角</span>
      </div>
      <canvas id="map"></canvas>
      <div class="pal row" style="margin-top:8px">
        <span class="muted">扔个假事故 →</span>
        <button data-t="person_down" class="warn" onclick="pickProp('person_down',this)">🆘 人倒地</button>
        <button data-t="fire" class="warn" onclick="pickProp('fire',this)">🔥 起火</button>
        <button data-t="flooding" class="warn" onclick="pickProp('flooding',this)">🌊 积水</button>
        <button data-t="clutter" onclick="pickProp('clutter',this)">🗑️ 杂物</button>
        <button onclick="pickProp('erase',this)">🧽 擦除</button>
        <button onclick="clearProps()">清空</button>
      </div>
    </div>

    <div>
      <div class="card">
        <p class="sec">🎥 假狗镜头 → 发给平台判</p>
        <canvas id="cam"></canvas>
        <p class="muted" id="caminfo">假狗走到事故旁边,这里就出现它看到的画面</p>
      </div>
      <div class="card">
        <p class="sec">状态</p>
        <div class="muted" id="status">—</div>
      </div>
    </div>
  </div>

  <div class="card"><p class="sec">上报日志</p><div id="log"></div></div>
</div>

<script type="module">
import * as THREE from './lib/three.module.js';
const $=id=>document.getElementById(id);
const log=[]; function L(m){log.unshift(new Date().toLocaleTimeString()+'  '+m);log.length=Math.min(log.length,50);$('log').textContent=log.join('\n');}

let POINTS=[], ROUTE=[], PROPS=[], seq=1, pick=null, lastSnapKey='';
const dog={x:0,y:0,yaw:0,seg:0,segT:0,running:false,paused:false,speed:0.9,robotId:'',connected:false};
let view='top', orbitCam=null, dragging=false, lastM={x:0,y:0}, pcdPts=null; const orbit={az:0.8,el:0.85,dist:60};
const CAPTURE_DIST=3.4, PROP_DIST=3.0, PT={};

// ---------- prop meshes (与 render.html 同款图元低模) ----------
const mat=(c,e)=>new THREE.MeshStandardMaterial({color:c,emissive:e||0,emissiveIntensity:e?1.3:0,roughness:.85});
function mPerson(lying){const g=new THREE.Group();const skin=mat(0xe6b58f),shirt=mat(0x3a6ea5),pants=mat(0x2f343b),hair=mat(0x3a2a20);
  const t=new THREE.Mesh(new THREE.BoxGeometry(.52,.7,.3),shirt);t.position.y=1;g.add(t);
  const hip=new THREE.Mesh(new THREE.BoxGeometry(.46,.3,.28),pants);hip.position.y=.6;g.add(hip);
  const head=new THREE.Mesh(new THREE.SphereGeometry(.17,16,16),skin);head.position.y=1.58;g.add(head);
  const hr=new THREE.Mesh(new THREE.SphereGeometry(.18,16,16,0,6.3,0,1.4),hair);hr.position.y=1.6;g.add(hr);
  [1,-1].forEach(s=>{const a=new THREE.Mesh(new THREE.CapsuleGeometry(.075,.52,4,8),shirt);a.position.set(s*.36,1,0);a.rotation.z=s*.32;g.add(a);
    const l=new THREE.Mesh(new THREE.CapsuleGeometry(.1,.62,4,8),pants);l.position.set(s*.13,.2,0);g.add(l);});
  if(lying){g.rotation.x=-Math.PI/2;g.position.y=.2;}return g;}
function mFire(){const g=new THREE.Group();const fl=[0xff4400,0xff7a00,0xffc107];
  for(let i=0;i<9;i++){const c=new THREE.Mesh(new THREE.ConeGeometry(.22-i*.018,.5+(i%3)*.35,8),mat(fl[i%3],fl[i%3]));c.position.set((i%3-1)*.28,.32+(i%3)*.22,((i%2)-.5)*.4);g.add(c);}
  for(let i=0;i<5;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(.26+i*.04,8,8),new THREE.MeshStandardMaterial({color:0x3a3a3a,transparent:true,opacity:.55}));s.position.set(Math.sin(i)*.5,1.3+i*.32,Math.cos(i)*.4);g.add(s);}return g;}
function mFlood(){const g=new THREE.Group();const w=new THREE.Mesh(new THREE.CircleGeometry(1.4,24),new THREE.MeshStandardMaterial({color:0x2f6f9f,metalness:.6,roughness:.15,transparent:true,opacity:.8}));w.rotation.x=-Math.PI/2;w.position.y=.03;g.add(w);
  const w2=new THREE.Mesh(new THREE.CircleGeometry(.8,20),new THREE.MeshStandardMaterial({color:0x3a86c0,metalness:.6,roughness:.1,transparent:true,opacity:.7}));w2.rotation.x=-Math.PI/2;w2.position.set(.5,.05,.3);g.add(w2);return g;}
function mClutter(){const g=new THREE.Group();const cl=[0xcf4b3a,0x4aa86a,0xe0ac2b,0xeeeeee,0x7d86c4,0xb9763a];
  for(let i=0;i<14;i++){const sz=.13+(i*37%100)/100*.22;const m=new THREE.Mesh(new THREE.BoxGeometry(sz,sz*.5,sz*.8),mat(cl[i%cl.length]));m.position.set(((i*53%100)/100-.5)*2.4,sz*.25,((i*91%100)/100-.5)*2.4);m.rotation.y=i*.7;g.add(m);}return g;}
function propMesh(t){return t==='person_down'?mPerson(true):t==='fire'?mFire():t==='flooding'?mFlood():mClutter();}
const PROP_ICON={person_down:0xda3633,fire:0xff7a00,flooding:0x2f6f9f,clutter:0xe0ac2b};
const INCIDENT=new Set(['person_down','fire','flooding']);

function envScene(){const s=new THREE.Scene();s.background=new THREE.Color(0xaebfce);
  s.add(new THREE.AmbientLight(0xffffff,.78));const d=new THREE.DirectionalLight(0xffffff,.9);d.position.set(6,12,4);s.add(d);
  const f=new THREE.Mesh(new THREE.PlaneGeometry(200,200),mat(0xe3e9ef));f.rotation.x=-Math.PI/2;s.add(f);return s;}

// ---------- map (top-down) ----------
const mapR=new THREE.WebGLRenderer({canvas:$('map'),antialias:true});
let mapScene,mapCam,dogMark,dogLabel,markers=[];
function buildMap(){
  mapScene=new THREE.Scene();mapScene.background=new THREE.Color(0x0a0d11);
  mapScene.add(new THREE.AmbientLight(0xffffff,.9));const d=new THREE.DirectionalLight(0xffffff,.5);d.position.set(0,10,2);mapScene.add(d);
  const xs=POINTS.map(p=>p.x),ys=POINTS.map(p=>p.y);
  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const cx=(minx+maxx)/2,cy=(miny+maxy)/2,span=Math.max(maxx-minx,maxy-miny)*1.3+6;
  PT.cx=cx;PT.cy=cy;PT.span=span;
  const W=$('map').clientWidth,H=$('map').clientHeight;mapR.setSize(W,H,false);
  const a=W/H;mapCam=new THREE.OrthographicCamera(-span/2*a,span/2*a,span/2,-span/2,1,1000);
  mapCam.position.set(cx,100,cy);mapCam.up.set(0,0,-1);mapCam.lookAt(cx,0,cy);
  orbitCam=new THREE.PerspectiveCamera(48,a,.5,5000);orbit.dist=span*1.05;     // 3D 全景相机
  // floor
  const f=new THREE.Mesh(new THREE.PlaneGeometry(span*2,span*2),mat(0x141a22));f.rotation.x=-Math.PI/2;mapScene.add(f);
  // route line (loop)
  const pts=ROUTE.map(i=>new THREE.Vector3(POINTS[i].x,.2,POINTS[i].y));pts.push(pts[0]);
  mapScene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x2e6fb0})));
  // point markers
  POINTS.forEach(p=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,.2,16),mat(0x5a6675));m.position.set(p.x,.1,p.y);mapScene.add(m);mapScene.add(label(p.name,p.x,p.y+ (PT.span*0.018)));});
  // dog
  dogMark=new THREE.Mesh(new THREE.ConeGeometry(.9,1.8,4),mat(0x32d36b,0x0a3a18));dogMark.rotation.x=Math.PI/2;dogMark.position.set(dog.x,.6,dog.y);mapScene.add(dogMark);
  dogLabel=label('🐕 假狗',dog.x,dog.y);
  markers=[];renderPropMarkers();
}
function label(txt,x,y){const c=document.createElement('canvas');c.width=256;c.height=64;const g=c.getContext('2d');g.fillStyle='#cbd5e1';g.font='28px sans-serif';g.textAlign='center';g.fillText(txt,128,40);
  const t=new THREE.CanvasTexture(c);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,depthTest:false}));sp.position.set(x,1,y);sp.scale.set(PT.span*0.13,PT.span*0.033,1);return sp;}
function renderPropMarkers(){markers.forEach(m=>mapScene.remove(m));markers=[];
  PROPS.forEach(p=>{const m=new THREE.Mesh(new THREE.SphereGeometry(.7,12,12),mat(PROP_ICON[p.type]||0xffffff,PROP_ICON[p.type]));m.position.set(p.x,.8,p.y);m.userData=p;mapScene.add(m);markers.push(m);});
  buildCamScene();}                                          // 物件变了→重建狗相机场景
function animate(){requestAnimationFrame(animate);if(!mapScene)return;if(dogMark){dogMark.position.set(dog.x,.6,dog.y);dogMark.rotation.z=-dog.yaw;}if(dogLabel)dogLabel.position.set(dog.x,2.6,dog.y);
  let cam=mapCam;
  if(view==='pano'&&orbitCam){const cx=PT.cx,cy=PT.cy,r=orbit.dist,e=orbit.el;
    orbitCam.position.set(cx+r*Math.cos(e)*Math.sin(orbit.az),r*Math.sin(e)+3,cy+r*Math.cos(e)*Math.cos(orbit.az));orbitCam.up.set(0,1,0);orbitCam.lookAt(cx,1,cy);cam=orbitCam;}
  mapR.render(mapScene,cam);renderCam();}
animate();

// 全景轨道控制 + 切换
window.toggleView=()=>{view=view==='top'?'pano':'top';$('viewBtn').textContent=view==='top'?'🌐 全景':'🗺️ 俯视';$('map').style.cursor=view==='top'?'crosshair':'grab';};
$('map').addEventListener('mousedown',e=>{if(view==='pano'){dragging=true;lastM={x:e.clientX,y:e.clientY};}});
window.addEventListener('mouseup',()=>dragging=false);
$('map').addEventListener('mousemove',e=>{if(!dragging||view!=='pano')return;orbit.az-=(e.clientX-lastM.x)*.006;orbit.el=Math.max(.18,Math.min(1.45,orbit.el+(e.clientY-lastM.y)*.006));lastM={x:e.clientX,y:e.clientY};});
$('map').addEventListener('wheel',e=>{if(view!=='pano')return;e.preventDefault();orbit.dist=Math.max(PT.span*.4,Math.min(PT.span*3,orbit.dist*(1+e.deltaY*.001)));},{passive:false});

// click map → world xy (raycast floor)；仅俯视模式可摆物
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
$('map').addEventListener('click',e=>{if(!mapCam||view!=='top')return;const r=$('map').getBoundingClientRect();
  mouse.x=((e.clientX-r.left)/r.width)*2-1;mouse.y=-((e.clientY-r.top)/r.height)*2+1;ray.setFromCamera(mouse,mapCam);
  const hit=ray.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0),0),new THREE.Vector3());if(!hit)return;
  if(pick==='erase'){const near=PROPS.find(p=>Math.hypot(p.x-hit.x,p.y-hit.z)<1.5);if(near){PROPS=PROPS.filter(p=>p!==near);renderPropMarkers();saveWorld();L('🧽 擦除 '+near.type);}return;}
  if(!pick){L('先选调色板里一个物件再点地图');return;}
  PROPS.push({id:seq++,type:pick,x:+hit.x.toFixed(1),y:+hit.z.toFixed(1)});renderPropMarkers();saveWorld();L('＋摆放 '+pick+' @('+hit.x.toFixed(1)+','+hit.z.toFixed(1)+')');});

window.pickProp=(t,btn)=>{pick=t;document.querySelectorAll('.pal button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');};
window.clearProps=()=>{PROPS=[];renderPropMarkers();saveWorld();L('清空物件');};

// ---------- 狗相机:连续向前渲染(像真摄像头)→ 录成会动的视频段 ----------
const camR=new THREE.WebGLRenderer({canvas:$('cam'),antialias:true,preserveDrawingBuffer:true});
camR.setSize(384,288,false);
const camView=new THREE.PerspectiveCamera(72,384/288,.05,300);
let camScene=null;
function buildCamScene(){camScene=envScene();PROPS.forEach(p=>{const m=propMesh(p.type);m.position.set(p.x,0,p.y);camScene.add(m);});}
function renderCam(){if(!camScene)return;const fx=dog.x+Math.cos(dog.yaw)*5,fz=dog.y+Math.sin(dog.yaw)*5;
  camView.position.set(dog.x,1.1,dog.y);camView.lookAt(fx,.3,fz);camR.render(camScene,camView);}

// 录像:走起来就连续录,每 SEG 秒发一段会动的 webm(像真狗的 20s 段)
let recorder=null, recChunks=[], recTimer=null; const SEG=10;
function startRec(){
  if(!dog.connected||!$('cam').captureStream)return;
  try{
    const stream=$('cam').captureStream(15); recChunks=[];
    let mime='video/webm'; if(window.MediaRecorder&&!MediaRecorder.isTypeSupported(mime))mime='';
    recorder=new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
    recorder.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
    recorder.onstop=async()=>{const blob=new Blob(recChunks,{type:'video/webm'});if(blob.size>2000)await uploadClip(blob);if(dog.running)startRec();};
    recorder.start();
    recTimer=setTimeout(()=>{if(recorder&&recorder.state!=='inactive')recorder.stop();},SEG*1000);
  }catch(e){L('!! 录制失败 '+(e.message||e));}}
function stopRec(){if(recTimer)clearTimeout(recTimer);recTimer=null;if(recorder&&recorder.state!=='inactive')recorder.stop();}
async function uploadClip(blob){
  const b64=await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(blob);});
  $('caminfo').textContent='传一段视频…';
  const r=await J('/api/snap',{video:b64,segmentSeconds:SEG});
  $('caminfo').textContent='平台:'+(r.matchedPoint||'—')+(r.incidents&&r.incidents.length?' · 突发'+r.incidents.join(','):'');
  L('🎥 发一段 '+SEG+'s 会动视频 → 平台 就近='+(r.matchedPoint||'—')+(r.incidents&&r.incidents.length?(' · 突发✓ '+r.incidents.join(',')):''));}

// ---------- network ----------
const J=(u,b)=>fetch(u,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(b||{})}).then(r=>r.json());
async function saveWorld(){try{await J('/api/world',{props:PROPS});}catch(e){}}

// 真实点云(PCD)→ 偏移到真实帧(与点位对齐:+cx,+zmin,+cy)→ 叠进犬境
async function loadPcd(){
  try{const d=await fetch('/api/pcd').then(r=>r.json());
    if(!d.hasPcd){L('该项目无点云'+(d.error?'('+d.error+')':''));return;}
    const m=d.meta, bin=atob(d.b64), u8=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
    const pos=new Float32Array(u8.buffer), n=pos.length/3, arr=new Float32Array(pos.length), col=new Float32Array(pos.length);
    const dz=(m.zmax-m.zmin)||1;
    for(let i=0;i<n;i++){const X=pos[i*3]+m.cx,Y=pos[i*3+1]+m.zmin,Z=pos[i*3+2]+m.cy;arr[i*3]=X;arr[i*3+1]=Y;arr[i*3+2]=Z;
      const t=Math.max(0,Math.min(1,(pos[i*3+1])/dz));col[i*3]=.15+.7*t;col[i*3+1]=.45+.3*t;col[i*3+2]=1-.6*t;}
    const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(arr,3));g.setAttribute('color',new THREE.BufferAttribute(col,3));
    if(pcdPts){mapScene.remove(pcdPts);}pcdPts=new THREE.Points(g,new THREE.PointsMaterial({size:.5,vertexColors:true,sizeAttenuation:true}));mapScene.add(pcdPts);
    orbit.dist=Math.max(orbit.dist,(m.radius||PT.span)*1.4);
    L('🗺️ 载入真实点云 '+n.toLocaleString()+' 点'+(d.site?' · '+d.site:''));
  }catch(e){L('!! 点云载入失败 '+(e&&e.message||e));}}
window.togglePcd=()=>{if(!pcdPts){loadPcd();return;}pcdPts.visible=!pcdPts.visible;L(pcdPts.visible?'显示点云':'隐藏点云');};
window.connect=async()=>{$('err').textContent='';
  const r=await J('/api/connect',{backend:$('backend').value,robotId:$('robotId').value,token:$('token').value});
  if(!r.ok){$('err').textContent=r.error||'连接失败';return;}
  const plan=await fetch('/api/plan').then(r=>r.json());POINTS=plan.points;ROUTE=POINTS.map((_,i)=>i);dog.robotId=plan.robotId;dog.connected=true;
  dog.x=POINTS[0].x;dog.y=POINTS[0].y;dog.seg=0;dog.segT=0;
  try{const w=await fetch('/api/world').then(r=>r.json());PROPS=(w.props||[]).map(p=>({id:seq++,...p}));}catch(e){}
  buildMap();$('dot').classList.add('on');$('conn').textContent=plan.robotId+' · '+POINTS.length+'点位';L('已连接 · '+POINTS.length+' 点位 —— 现在扔个事故,再点开始巡检');};

window.startWalk=()=>{if(!dog.connected){L('先连接');return;}dog.running=true;dog.paused=false;startRec();L('▶ 开始巡检(开始连续录像,每'+SEG+'s 发一段)');};
window.togglePause=()=>{if(dog.running)dog.paused=!dog.paused;L(dog.paused?'⏸ 暂停':'▶ 继续');};
window.stopWalk=()=>{dog.running=false;stopRec();J('/api/heartbeat',{x:POINTS[0]?.x||0,y:POINTS[0]?.y||0,status:'idle'});L('⏹ 回待命');};

// ---------- sim loop ----------
let lastHb=0;
setInterval(()=>{
  if(!dog.connected)return;
  $('status').innerHTML=`${dog.running?(dog.paused?'⏸ 暂停':'● 巡检中'):'○ 待命'} · 位置(${dog.x.toFixed(1)}, ${dog.y.toFixed(1)}) · 速度 ${dog.speed}`;
  if(!dog.running||dog.paused)return;
  // 沿环形路线推进(本地平滑走;位姿只每 5 秒报一个点 → 像真狗)
  let A=POINTS[ROUTE[dog.seg]],B=POINTS[ROUTE[(dog.seg+1)%ROUTE.length]];
  const segLen=Math.hypot(B.x-A.x,B.y-A.y)||1;
  dog.segT+=dog.speed*0.5/segLen;
  if(dog.segT>=1){dog.segT-=1;dog.seg=(dog.seg+1)%ROUTE.length;A=POINTS[ROUTE[dog.seg]];B=POINTS[ROUTE[(dog.seg+1)%ROUTE.length]];}
  dog.x=A.x+(B.x-A.x)*dog.segT;dog.y=A.y+(B.y-A.y)*dog.segT;dog.yaw=Math.atan2(B.y-A.y,B.x-A.x);
  if(Date.now()-lastHb>5000){lastHb=Date.now();J('/api/heartbeat',{x:dog.x,y:dog.y,yaw:dog.yaw,speed:dog.speed,status:'patrolling'});}
},140);

$('backend').value='http://localhost:8000';
</script>
</body></html>
